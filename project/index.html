<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NataCONNECT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      const root = document.getElementById('root');
      function renderFallback() {
        if (!root) return;
        root.innerHTML = `
          <style>body{font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#07132A;color:#E6EEF6;padding:24px} .card{background:#041226;padding:16px;border-radius:12px;margin-bottom:12px;border:1px solid rgba(255,255,255,0.03)} input,textarea,select{width:100%;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:#E6EEF6} button{padding:8px 12px;border-radius:8px;border:none;background:#3b82f6;color:white} .muted{color:#98A0B3;font-size:13px}</style>
          <h1>NataCONNECT — Static Preview</h1>
          <p class="muted">Vite module not available. This lightweight fallback works with Go Live (static server).</p>
          <div class="card">
            <h2>Guide</h2>
            <p class="muted">Type your investing idea and click Suggest.</p>
            <textarea id="guideInput" rows="4" placeholder="E.g. thinking about AAPL and NVDA for AI exposure"></textarea>
            <div style="margin-top:8px"><button id="guideSuggest">Suggest</button> <button id="guideClear">Clear</button></div>
            <div id="guideResults" style="margin-top:12px"></div>
          </div>

          <div class="card">
            <h2>Practice (Fake Accounts)</h2>
            <p class="muted">Create multiple fake accounts and place simple trades.</p>
            <div style="display:flex;gap:8px;margin-top:8px"><select id="acctSelect"></select><button id="newAcct">New Account</button></div>
            <div id="acctInfo" style="margin-top:12px"></div>
            <div style="margin-top:12px"><input id="tradeSymbol" placeholder="Ticker (AAPL)" style="width:40%"/> <input id="tradeQty" placeholder="Qty" style="width:20%"/> <button id="placeTrade">Place Trade</button></div>
            <div id="tradeHistory" style="margin-top:12px"></div>
          </div>
        `;

        // Guide logic (plain JS)
        const suggestEl = document.getElementById('guideSuggest');
        const clearEl = document.getElementById('guideClear');
        const inputEl = document.getElementById('guideInput');
        const resultsEl = document.getElementById('guideResults');

        function generateSuggestionsText(s){
          s = (s||'').trim();
          if(!s) return ['Type something to get suggestions.'];
          const out = [];
          const tickers = Array.from(new Set((s.match(/[A-Z]{1,5}/g)||[])));
          if(tickers.length){
            tickers.forEach(function(t){ out.push(t + ': Consider small starter position (1-3%); set stop ~3%'); });
          }
          if(/ai|semiconductor/i.test(s)) out.push('AI/Semiconductors: consider ETFs or top chip names.');
          if(/dividend|income/i.test(s)) out.push('Dividend: prefer sustainable payers; ladder entries.');
          if(out.length===0) out.push('Break idea into thesis, timeframe, risk, and exit.');
          return out;
        }

        suggestEl && suggestEl.addEventListener('click', function(){
          var txt = (inputEl && inputEl.value) ? inputEl.value : '';
          var items = generateSuggestionsText(txt);
          resultsEl && (resultsEl.innerHTML = items.map(function(i){ return '<div style="padding:8px;border-radius:8px;background:rgba(255,255,255,0.02);margin-bottom:6px">' + i + '</div>'; }).join(''));
        });
        clearEl && clearEl.addEventListener('click', function(){ if(inputEl) inputEl.value = ''; if(resultsEl) resultsEl.innerHTML = ''; });

        // Practice accounts logic (plain JS)
        var acctSelect = document.getElementById('acctSelect');
        var newAcctBtn = document.getElementById('newAcct');
        var acctInfo = document.getElementById('acctInfo');
        var tradeSymbol = document.getElementById('tradeSymbol');
        var tradeQty = document.getElementById('tradeQty');
        var placeTrade = document.getElementById('placeTrade');
        var tradeHistory = document.getElementById('tradeHistory');

        var STORAGE_KEY = 'nata_practice_accounts_v1';
        function loadAccounts(){
          try{var raw = localStorage.getItem(STORAGE_KEY); return raw?JSON.parse(raw):[{id:Date.now().toString(),balance:10000,initialBalance:10000,trades:[]}]}catch(e){return [{id:Date.now().toString(),balance:10000,initialBalance:10000,trades:[]}];}
        }
        function saveAccounts(a){localStorage.setItem(STORAGE_KEY,JSON.stringify(a));}
        var accounts = loadAccounts();
        function refreshAccts(){ if(!acctSelect) return; acctSelect.innerHTML = accounts.map(function(a){ return '<option value="'+a.id+'">Acct '+a.id.slice(-4)+' — €'+a.balance.toFixed(2)+'</option>'; }).join(''); acctSelect.value = accounts[0] ? accounts[0].id : ''; renderAcct(); }
        function renderAcct(){ if(!acctSelect) return; var a = accounts.find(function(x){ return x.id === acctSelect.value; }) || accounts[0]; if(!a){ if(acctInfo) acctInfo.innerHTML=''; if(tradeHistory) tradeHistory.innerHTML=''; return; } if(acctInfo) acctInfo.innerHTML = '<div class="muted">Balance</div><div style="font-weight:600;margin-top:6px">€'+a.balance.toFixed(2)+'</div>'; if(tradeHistory) tradeHistory.innerHTML = (a.trades||[]).map(function(t){ return '<div style="padding:6px;margin-bottom:6px;border-radius:6px;background:rgba(255,255,255,0.02)">'+t.symbol+' '+t.qty+' @ €'+t.price.toFixed(2)+(t.pnl!==undefined?(' — PnL €'+t.pnl.toFixed(2)):'')+'</div>'; }).join(''); }
        newAcctBtn && newAcctBtn.addEventListener('click', function(){ var newA = {id:Date.now().toString(),balance:10000,initialBalance:10000,trades:[]}; accounts.unshift(newA); saveAccounts(accounts); refreshAccts(); });
        acctSelect && acctSelect.addEventListener('change', function(){ renderAcct(); });
        placeTrade && placeTrade.addEventListener('click', function(){ var sym = tradeSymbol && tradeSymbol.value ? tradeSymbol.value.toUpperCase().trim() : ''; var qty = parseFloat(tradeQty && tradeQty.value ? tradeQty.value : '0'); if(!sym || !qty) return alert('Enter symbol and qty'); var price = Math.round((Math.random()*300+20)*100)/100; var cost = price*qty; var a = accounts.find(function(x){ return x.id === (acctSelect && acctSelect.value); }) || accounts[0]; if(cost > a.balance) return alert('Insufficient funds'); a.balance -= cost; var pnl = Math.round((Math.random()-0.5)*price*qty*100)/100; (a.trades || (a.trades = [])).unshift({symbol: sym, qty: qty, price: price, pnl: pnl}); saveAccounts(accounts); renderAcct(); });

        refreshAccts();
      }

      // Probe the server: if the server serves JS for the entry module, import it (Vite dev). Otherwise render fallback immediately.
      fetch('./src/main.tsx', { method: 'GET' }).then(function(res){
        var ct = res.headers.get('content-type') || '';
        if (res.ok && ct.indexOf('javascript') !== -1) {
          import('./src/main.tsx').catch(function(){ renderFallback(); });
        } else {
          renderFallback();
        }
      }).catch(function(){ renderFallback(); });
    </script>
  </body>
</html>
